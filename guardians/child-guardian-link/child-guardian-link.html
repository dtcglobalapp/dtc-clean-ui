<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>DTC — Redirecting…</title>
  <meta name="robots" content="noindex" />
  <script>
    (function () {
      const current = new URL(window.location.href);
      const childId = current.searchParams.get("child_id") || "";
      const target = new URL("./child-guardian-link/child-guardian-link.html", window.location.href);

      if (childId) {
        target.searchParams.set("child_id", childId);
      }

      window.location.replace(target.toString());
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: white;
    }
    .box {
      text-align: center;
      padding: 24px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div class="box">Redirecting to Child Guardian Link…</div>
</body>
</html>
