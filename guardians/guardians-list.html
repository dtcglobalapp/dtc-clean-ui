<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-title" content="DTC" />
  <title>DTC — Guardians</title>
  <link rel="stylesheet" href="../dtc.css" />
</head>

<body class="dtc-shell">
  <main class="dtc-page">

    <section class="dtc-page-head">
      <div class="dtc-title-group">
        <p class="dtc-eyebrow">Families / Guardians</p>
        <h1 id="pageTitle" class="dtc-page-title">Guardians</h1>
        <p id="pageSubtitle" class="dtc-page-subtitle">
          Manage parents, pickup contacts, emergency contacts and remote authorization.
        </p>
      </div>

      <div class="dtc-head-actions">
        <a class="dtc-btn dtc-btn-ghost dtc-action-back" href="../dashboard.html">← Back</a>
        <a class="dtc-btn dtc-btn-primary dtc-action-primary" href="./guardian-form.html">+ Add Guardian</a>
      </div>
    </section>

    <section class="dtc-card">

      <div class="dtc-toolbar">
        <div class="dtc-toolbar-left">
          <div class="dtc-search-wrap">
            <label class="dtc-search-label" for="searchInput">Search</label>
            <input
              id="searchInput"
              class="dtc-search"
              type="search"
              placeholder="Name, relationship, email, phone..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="dtc-toolbar-right">
          <button id="refreshBtn" class="dtc-btn dtc-btn-secondary dtc-action-secondary" type="button">
            Refresh
          </button>
        </div>
      </div>

      <div id="messageBox" class="dtc-feedback hidden" role="status" aria-live="polite"></div>

      <div id="loadingState" class="dtc-loading hidden">
        Loading guardians...
      </div>

      <div id="emptyState" class="dtc-empty-state hidden">
        <h3>No guardians found</h3>
        <p>There are no guardian records yet for this organization.</p>
        <a class="dtc-btn dtc-btn-primary dtc-action-primary" href="./guardian-form.html">
          Create first guardian
        </a>
      </div>

      <div id="guardiansGrid" class="dtc-grid-cards"></div>

    </section>

  </main>

  <script type="module">
    import "./guardians-list.js";
    import { applyBranding } from "../core/brand.js";
    applyBranding();
  </script>
</body>
</html>
