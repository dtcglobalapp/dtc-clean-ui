<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DTC — Employee Profile</title>
  <link rel="stylesheet" href="../dtc.css" />
</head>

<body class="dtc-shell">
  <main class="dtc-page">

    <!-- HEADER -->
    <section class="dtc-page-head">
      <div class="dtc-title-group">
        <p class="dtc-eyebrow">Staff / Profile</p>
        <h1 class="dtc-page-title">Employee Profile</h1>
        <p class="dtc-page-subtitle">
          Employee information, activity and work sessions.
        </p>
      </div>

      <div class="dtc-head-actions">
        <a href="./employees-list.html" class="dtc-btn dtc-btn-ghost">← Back</a>
      </div>
    </section>

    <!-- LOADING -->
    <div id="loadingState" class="dtc-loading">
      Loading employee...
    </div>

    <!-- CONTENT -->
    <section id="profileContent" class="dtc-two-column hidden">

      <!-- LEFT -->
      <aside class="dtc-stack-lg">

        <section class="dtc-card">
          <div class="dtc-stack-md">

            <div class="dtc-media-frame">
              <img id="employeePhoto" class="dtc-card-photo" src="" />
            </div>

            <div>
              <h2 id="employeeName" class="dtc-profile-name">—</h2>
              <p id="employeeRole" class="dtc-profile-role">—</p>

              <div class="dtc-inline-meta">
                <span id="employeeStatus" class="dtc-badge dtc-badge-neutral">inactive</span>
              </div>
            </div>

          </div>
        </section>

        <!-- STATS -->
        <section class="dtc-card">
          <div class="dtc-section-head">
            <h2 class="dtc-section-title">Work Stats</h2>
          </div>

          <div class="dtc-info-grid">
            <article class="dtc-info-item">
              <span class="dtc-info-label">Total Hours</span>
              <strong id="totalHours" class="dtc-info-value">0h</strong>
            </article>

            <article class="dtc-info-item">
              <span class="dtc-info-label">Sessions</span>
              <strong id="totalSessions" class="dtc-info-value">0</strong>
            </article>

            <article class="dtc-info-item">
              <span class="dtc-info-label">Earned</span>
              <strong id="earned" class="dtc-info-value">$0</strong>
            </article>

            <article class="dtc-info-item">
              <span class="dtc-info-label">Pending</span>
              <strong id="pending" class="dtc-info-value">$0</strong>
            </article>
          </div>
        </section>

      </aside>

      <!-- RIGHT -->
      <section class="dtc-stack-lg">

        <section class="dtc-card">
          <div class="dtc-section-head">
            <h2 class="dtc-section-title">Recent Sessions</h2>
          </div>

          <div id="sessionsEmpty" class="dtc-empty-inline">
            No sessions found.
          </div>

          <div id="sessionsList" class="dtc-grid-cards hidden"></div>
        </section>

      </section>

    </section>

  </main>

  <script type="module" src="./employee-profile.js"></script>
</body>
</html>
