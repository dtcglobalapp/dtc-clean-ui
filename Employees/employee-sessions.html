<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DTC — Payroll Preview</title>
  <link rel="stylesheet" href="../dtc.css" />
</head>

<body class="dtc-shell">
  <main class="dtc-page">

    <section class="dtc-page-head">
      <div class="dtc-title-group">
        <p class="dtc-eyebrow">Employees / Payroll</p>
        <h1 class="dtc-page-title">Payroll Preview</h1>
        <p class="dtc-page-subtitle">
          Review work sessions, hours, and attendance flow before payroll is calculated.
        </p>
      </div>

      <div class="dtc-head-actions">
        <a class="dtc-btn dtc-btn-ghost dtc-action-back" href="./employees-list.html">← Back</a>
      </div>
    </section>

    <section class="dtc-card">

      <div class="dtc-toolbar">
        <div class="dtc-toolbar-left">
          <div class="dtc-search-wrap">
            <label class="dtc-search-label" for="searchInput">Search</label>
            <input
              id="searchInput"
              class="dtc-search"
              type="search"
              placeholder="Search by employee name, status, method..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="dtc-toolbar-right">
          <button id="refreshBtn" class="dtc-btn dtc-btn-secondary dtc-action-secondary" type="button">
            Refresh
          </button>
        </div>
      </div>

      <div id="messageBox" class="dtc-feedback hidden" role="status" aria-live="polite"></div>

      <div id="loadingState" class="dtc-loading hidden">
        Loading work sessions...
      </div>

      <div id="emptyState" class="dtc-empty-state hidden">
        <div class="dtc-stack-sm" style="justify-items:center;">
          <h3>No sessions found</h3>
          <p>No employee work sessions are available right now.</p>
        </div>
      </div>

      <div id="tableWrap" class="dtc-table-wrap">
        <table class="dtc-table">
          <thead>
            <tr>
              <th>Employee</th>
              <th>Status</th>
              <th>Check In</th>
              <th>Check Out</th>
              <th>Minutes</th>
              <th>Check In Method</th>
              <th>Check Out Method</th>
            </tr>
          </thead>
          <tbody id="sessionsTableBody"></tbody>
        </table>
      </div>

    </section>

  </main>

  <script type="module" src="./employee-sessions.js"></script>
</body>
</html>
