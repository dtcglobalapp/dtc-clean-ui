<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DTC — Employee</title>
  <link rel="stylesheet" href="../dtc.css" />
</head>

<body class="dtc-shell">
  <main class="dtc-page">

    <section class="dtc-page-head">
      <div class="dtc-title-group">
        <p class="dtc-eyebrow">Employees / Form</p>
        <h1 id="pageTitle" class="dtc-page-title">Employee</h1>
        <p id="pageSubtitle" class="dtc-page-subtitle">Manage employee details and access.</p>
      </div>

      <div class="dtc-head-actions">
        <a class="dtc-btn dtc-btn-ghost" href="./employees-list.html" id="backBtn">← Back</a>
      </div>
    </section>

    <section class="dtc-card form-panel">
      <div class="guardian-form-grid">

        <div class="guardian-form-main">
          <div class="form-group photo-group">
            <label>Photo</label>
            <div class="dtc-stack-md">
              <div class="dtc-media-frame" style="max-width:220px;">
                <img
                  id="photoPreview"
                  src="https://placehold.co/300x300?text=Employee"
                  alt="Employee Preview"
                />
              </div>
              <input type="file" id="photoInput" accept="image/*" />
            </div>
          </div>

          <div class="form-grid-2">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="John" />
            </div>

            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="Doe" />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="email@example.com" />
            </div>

            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="phone" placeholder="(000) 000-0000" />
            </div>

            <div class="form-group">
              <label>Role</label>
              <select id="role">
                <option value="employee">Employee</option>
                <option value="assistant">Assistant</option>
                <option value="director">Director</option>
                <option value="admin">Admin</option>
                <option value="owner">Owner</option>
              </select>
            </div>

            <div class="form-group">
              <label>Status</label>
              <select id="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="suspended">Suspended</option>
              </select>
            </div>

            <div class="form-group">
              <label>PIN</label>
              <input type="text" id="pin" placeholder="4-8 digits" maxlength="8" />
            </div>

            <div class="form-group toggles">
              <label class="toggle-row">
                <input type="checkbox" id="pinEnabled" checked />
                <span>Enable PIN</span>
              </label>

              <label class="toggle-row">
                <input type="checkbox" id="faceEnabled" />
                <span>Enable Face Scan</span>
              </label>
            </div>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button class="dtc-btn dtc-btn-primary" id="saveBtn" type="button">Save</button>
        <a class="dtc-btn dtc-btn-secondary" href="./employees-list.html">Cancel</a>
      </div>
    </section>

  </main>

  <script type="module" src="./employee-form.js"></script>
</body>
</html>
