<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Employee — DTC</title>

  <link rel="stylesheet" href="../dtc.css" />
</head>

<body class="dtc-shell">

  <main class="dtc-page">

    <!-- HEADER -->
    <header class="dtc-header">
      <div class="dtc-header-left">
        <p class="dtc-kicker">DTC • Employees</p>
        <h1 class="dtc-header-title">Create Employee</h1>
        <p class="dtc-header-subtitle">
          Register a new staff member in your daycare.
        </p>
      </div>

      <div class="dtc-header-right">
        <a href="./employees-list.html" class="dtc-btn dtc-btn-ghost">
          ← Back
        </a>
      </div>
    </header>

    <!-- MESSAGE -->
    <div id="messageBox" class="dtc-feedback hidden"></div>

    <!-- FORM PANEL -->
    <section class="dtc-panel">

      <form id="employeeForm" class="dtc-stack-lg">

        <!-- PHOTO -->
        <div class="dtc-field">
          <span>Photo</span>

          <div class="dtc-stack-md">

            <div class="dtc-media-frame">
              <img
                id="photoPreview"
                class="dtc-profile-photo"
                src="https://placehold.co/400x400?text=Employee"
                alt="Employee Preview"
              />
            </div>

            <input type="file" id="photoInput" accept="image/*" />

          </div>
        </div>

        <!-- NAME -->
        <div class="dtc-grid-3">

          <div class="dtc-field">
            <span>First Name</span>
            <input id="first_name" required />
          </div>

          <div class="dtc-field">
            <span>Middle Name</span>
            <input id="middle_name" />
          </div>

          <div class="dtc-field">
            <span>Last Name</span>
            <input id="last_name" required />
          </div>

        </div>

        <!-- CONTACT -->
        <div class="dtc-grid-3">

          <div class="dtc-field">
            <span>Phone</span>
            <input id="phone" />
          </div>

          <div class="dtc-field">
            <span>Secondary Phone</span>
            <input id="secondary_phone" />
          </div>

          <div class="dtc-field">
            <span>Email</span>
            <input id="email" type="email" />
          </div>

        </div>

        <!-- ROLE -->
        <div class="dtc-grid-3">

          <div class="dtc-field">
            <span>Role</span>
            <select id="role">
              <option value="assistant">Assistant</option>
              <option value="admin">Admin</option>
              <option value="owner">Owner</option>
            </select>
          </div>

          <div class="dtc-field">
            <span>Status</span>
            <select id="status">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div class="dtc-field">
            <span>Start Date</span>
            <input id="start_date" type="date" />
          </div>

        </div>

        <!-- NOTES -->
        <div class="dtc-field">
          <span>Notes</span>
          <textarea id="notes"></textarea>
        </div>

        <!-- ACTIONS -->
        <div class="dtc-inline-actions">
          <button type="submit" class="dtc-btn dtc-btn-primary">
            Save Employee
          </button>

          <a href="./employees-list.html" class="dtc-btn dtc-btn-secondary">
            Cancel
          </a>
        </div>

      </form>

    </section>

  </main>

  <script type="module" src="./employee-form.js"></script>

</body>
</html>
