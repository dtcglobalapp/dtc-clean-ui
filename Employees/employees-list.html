<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DTC — Employees</title>
  <link rel="stylesheet" href="../dtc.css" />
</head>

<body class="dtc-shell">
  <main class="dtc-page">

    <section class="dtc-page-head">
      <div class="dtc-title-group">
        <p class="dtc-eyebrow">Staff / Employees</p>
        <h1 class="dtc-page-title">Employees</h1>
        <p class="dtc-page-subtitle">
          Manage staff members, roles, permissions and access control.
        </p>
      </div>

      <div class="dtc-head-actions">
        <a class="dtc-btn dtc-btn-ghost dtc-action-back" href="../dashboard.html">← Back</a>
        <a class="dtc-btn dtc-btn-primary dtc-action-primary" href="./employee-form.html">+ Add Employee</a>
      </div>
    </section>

    <section class="dtc-card">

      <div class="dtc-toolbar">
        <div class="dtc-toolbar-left">
          <div class="dtc-search-wrap">
            <label class="dtc-search-label" for="searchInput">Search</label>
            <input
              id="searchInput"
              class="dtc-search"
              type="search"
              placeholder="Name, role, email, phone..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="dtc-toolbar-right">
          <button id="refreshBtn" class="dtc-btn dtc-btn-secondary dtc-action-secondary" type="button">
            Refresh
          </button>
        </div>
      </div>

      <div id="messageBox" class="dtc-feedback hidden"></div>

      <div id="loadingState" class="dtc-loading hidden">
        Loading employees...
      </div>

      <div id="emptyState" class="dtc-empty-state hidden">
        <h3>No employees found</h3>
        <p>Start by creating your first staff member.</p>
        <a class="dtc-btn dtc-btn-primary dtc-action-primary" href="./employee-form.html">
          Create Employee
        </a>
      </div>

      <div id="employeesGrid" class="dtc-grid-cards"></div>

    </section>

  </main>

  <script type="module" src="./employees-list.js"></script>
</body>
</html>
