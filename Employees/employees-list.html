<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DTC" />
  <title>DTC — Employees</title>
  <link rel="stylesheet" href="./employees.css" />
</head>
<body class="dtc-page">
  <main class="page-content">
    <header class="page-header employees-header">
      <div class="brand-lockup">
        <div class="brand-line">
          <p class="brand-main">DTC</p>
          <p class="brand-sub">Control Total (Daycares)</p>
        </div>
        <h1>Employees</h1>
        <p class="subtitle">
          Manage staff, PIN access, roles, and quick entry into kiosk workflows.
        </p>
      </div>

      <div class="header-actions">
        <a class="btn btn-secondary" href="../dashboard.html">Back</a>
        <a class="btn btn-primary" href="./employee-form.html">Add Employee</a>
      </div>
    </header>

    <section class="panel employees-gallery-panel">
      <div class="panel-toolbar employees-toolbar">
        <div class="search-wrap">
          <label class="sr-only" for="searchInput">Search employees</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Search by employee name, role, status..."
            autocomplete="off"
          />
        </div>

        <button id="refreshBtn" class="btn btn-secondary" type="button">
          Refresh
        </button>
      </div>

      <div id="messageBox" class="message hidden" role="status" aria-live="polite"></div>

      <div id="loadingState" class="state-box hidden">
        <p>Loading employees records...</p>
      </div>

      <div id="emptyState" class="state-box hidden">
        <h2>No employees found</h2>
        <p>There are no employee records yet for this organization.</p>
        <div class="employees-empty-action">
          <a class="btn btn-primary" href="./employee-form.html">Create first employee</a>
        </div>
      </div>

      <div id="employeesGrid" class="employees-gallery-grid"></div>
    </section>
  </main>

  <script type="module" src="./employees-list.js"></script>
</body>
</html>
