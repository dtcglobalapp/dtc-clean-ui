<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="apple-mobile-web-app-title" content="DTC" />
  <title>DTC — Children</title>
  <link rel="stylesheet" href="../dtc.css" />
</head>

<body class="dtc-shell">
  <main class="dtc-page">

    <section class="dtc-page-head">
      <div class="dtc-title-group">
        <p class="dtc-eyebrow">Children / Directory</p>
        <h1 class="dtc-page-title">Children</h1>
        <p class="dtc-page-subtitle">
          The children are the heart of DTC. Open profiles quickly and keep records organized.
        </p>
      </div>

      <div class="dtc-head-actions">
        <a class="dtc-btn dtc-btn-ghost" href="../dashboard.html">← Back</a>
        <a class="dtc-btn dtc-btn-primary" href="./child-form.html">+ Add Child</a>
      </div>
    </section>

    <section class="dtc-card">
      <div class="dtc-toolbar">
        <div class="dtc-toolbar-left">
          <div class="dtc-field">
            <label class="dtc-label" for="searchInput">Search</label>
            <input
              id="searchInput"
              class="dtc-input"
              type="search"
              placeholder="Search by child name or classroom..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="dtc-toolbar-right">
          <button id="refreshBtn" class="dtc-btn dtc-btn-secondary" type="button">
            Refresh
          </button>
        </div>
      </div>

      <div id="messageBox" class="dtc-feedback hidden" role="status" aria-live="polite"></div>

      <div id="loadingState" class="dtc-loading hidden">
        Loading children records...
      </div>

      <div id="emptyState" class="dtc-empty-state hidden">
        <h3>No children found</h3>
        <p>There are no matching child records yet for this organization.</p>
        <a class="dtc-btn dtc-btn-primary" href="./child-form.html">Create first child</a>
      </div>

      <div id="childrenGrid" class="dtc-grid-cards"></div>
    </section>

  </main>

  <script type="module">
    import "./children-list.js";
    import { applyBranding } from "../core/brand.js";
    applyBranding();
  </script>
</body>
</html>
