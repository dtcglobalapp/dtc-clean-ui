<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DTC Clean" />
  <title>DTC Clean — Login</title>
  <link rel="stylesheet" href="./dtc.css" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <p class="eyebrow">DTC Clean</p>
        <div class="brand-mark" aria-hidden="true">🏡</div>
      </div>

      <div class="login-copy">
        <h1>Sign in</h1>
        <p class="subtitle">
          Access your daycare workspace with a clean, secure mobile-ready login.
        </p>
      </div>

      <form id="loginForm" class="login-form">
        <label>
          <span>Email</span>
          <input
            id="emailInput"
            type="email"
            autocomplete="email"
            inputmode="email"
            required
          />
        </label>

        <label>
          <span>Password</span>
          <input
            id="passwordInput"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>

        <button id="loginBtn" class="btn btn-primary" type="submit">
          Sign In
        </button>
      </form>

      <div id="messageBox" class="message hidden" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="./login.js"></script>
</body>
</html>
