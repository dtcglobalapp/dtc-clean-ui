<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DTC" />
  <title>DTC</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f4f7fb;
      color: #172033;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding:
        max(16px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .boot-card {
      width: min(100%, 420px);
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #dde3ec;
      border-radius: 26px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 28px 22px;
      text-align: center;
    }

    .brand {
      display: inline-grid;
      place-items: center;
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #1d4ed8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
    }

    p {
      margin: 10px 0 0;
      color: #667085;
      line-height: 1.55;
      font-size: 15px;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #7b8698;
    }

    .link {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
  <script>
    (function () {
      const adminMode = localStorage.getItem("dtc_admin_mode");

      if (adminMode === "true") {
        window.location.replace("./login.html");
        return;
      }

      window.location.replace("./kiosk.html");
    })();
  </script>
</head>
<body>
  <main class="boot-card">
    <div class="brand">DTC</div>
    <p class="eyebrow">Control Total (Daycares)</p>
    <h1>Opening Kiosk…</h1>
    <p>DTC will open the daycare kiosk by default for daily operation.</p>
    <p class="hint">
      Admin access:
      <a class="link" href="./login.html">open login</a>
    </p>
  </main>
</body>
</html>
